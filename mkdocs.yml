site_name: "University DB Modeling 🏫"
site_url: "https://nandeslima.github.io/modelagem-universidade"
site_author: "Ariel Shlomoh"
site_description: "Arquitetura de Banco de Dados para Gestão Universitária"

theme:
  name: material
  language: pt-BR
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Alternar para modo claro
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Alternar para modo escuro
  features:
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

nav:
  - Início: index.md
  - O Projeto: projeto.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/NandesLima
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/ariel-shlomoh/

markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/custom.css